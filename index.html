<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZayFBS - Huile d'olive extra vierge du Maroc</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="logo"><h1>Zay<span>FBS</span></h1></div>
    <ul class="nav-links">
        <li><a href="#" data-page="accueil" class="active">Accueil</a></li>
        <li><a href="#" data-page="produits">Nos Produits</a></li>
        <li><a href="#" data-page="contact">Contact</a></li>
    </ul>
    <div class="cart-icon" id="cartIconBtn">
        <i class="fas fa-shopping-basket"></i>
        <span class="cart-count" id="cartCount">0</span>
    </div>
</nav>

<!-- Panier latéral -->
<div id="cartPanel" class="cart-overlay">
    <div class="cart-header">
        <h2><i class="fas fa-shopping-cart"></i> Mon Panier</h2>
        <button class="close-cart" id="closeCartBtn">&times;</button>
    </div>
    <div id="cartItemsContainer" class="cart-items-list"></div>
    <div id="cartTotal" class="cart-total">Total: 0,00 MAD</div>
</div>

<!-- Contenu principal dynamique -->
<main id="mainContent" class="container"></main>

<footer>
    <div class="footer-info">
        <span><i class="fas fa-map-marker-alt"></i> Fquih Ben Saleh, Béni Mellal-Khénifra, Maroc</span>
        <span><i class="fas fa-envelope"></i> info@zayfbs.com</span>
        <span><i class="fas fa-phone-alt"></i> +212 5 23 45 67 89</span>
    </div>
    <p style="margin-top:1rem;">© 2025 ZayFBS - Fquih Ben Saleh - Huile d'olive authentique</p>
</footer>

<script src="script.js">
    
</script>
</body>
</html>
